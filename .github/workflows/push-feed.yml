name: Push GTFS-RT feed

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). The job runs an internal 30 s loop
    # for ~4 min, so there is always a fresh process ready well before the
    # next trigger fires.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # manual trigger

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check for concurrent runs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const SIX_MIN_MS = 6 * 60 * 1000;
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'push-feed.yml',
              status: 'in_progress',
              per_page: 20,
            });

            let proceed = true;
            for (const run of workflow_runs) {
              if (run.id === context.runId) continue;
              const ageMs = Date.now() - new Date(run.run_started_at).getTime();
              const ageSec = Math.round(ageMs / 1000);
              if (ageMs >= SIX_MIN_MS) {
                core.info(`Cancelling stale run ${run.id} (${ageSec}s old)`);
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              } else {
                core.info(`Skipping: run ${run.id} is already in progress (${ageSec}s old)`);
                proceed = false;
              }
            }
            core.setOutput('proceed', String(proceed));

  push-feed:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # safety net — normal runtime is ~4 min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install -e .

      # Load GTFS + model from R2 once, push 8 times at 30 s intervals (~4 min).
      # Resources stay in memory across pushes; only one R2 load per job.
      - name: Push feed every 30 s
        run: python scripts/push_feed.py --loop 30 --count 8
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            gtfs-lviv
          GTFS_RT_URL:          https://track.ua-gis.com/gtfs/lviv/vehicle_position
