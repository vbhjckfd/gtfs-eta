name: Push GTFS-RT feed

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). The job runs an internal 30 s loop
    # for ~4 min, so there is always a fresh process ready well before the
    # next trigger fires.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # manual trigger

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check for concurrent runs
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          SIX_MIN_S=360
          proceed=true
          now=$(date +%s)
          while IFS=$'\t' read -r id started_at; do
            [ "$id" = "$RUN_ID" ] && continue
            started_s=$(date -d "$started_at" +%s)
            age_s=$(( now - started_s ))
            if [ "$age_s" -ge "$SIX_MIN_S" ]; then
              echo "Cancelling stale run $id (${age_s}s old)"
              gh run cancel "$id" --repo "$REPO"
            else
              echo "Skipping: run $id already in progress (${age_s}s old)"
              proceed=false
            fi
          done < <(gh run list --repo "$REPO" --workflow push-feed.yml --status in_progress \
            --json databaseId,startedAt --jq '.[] | [.databaseId, .startedAt] | @tsv')
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

  push-feed:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # safety net — normal runtime is ~4 min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      # Load GTFS + model from R2 once, push 8 times at 30 s intervals (~4 min).
      # Resources stay in memory across pushes; only one R2 load per job.
      - name: Push feed every 30 s
        run: python scripts/push_feed.py --loop 30 --count 8
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            gtfs-lviv
          GTFS_RT_URL:          https://track.ua-gis.com/gtfs/lviv/vehicle_position
