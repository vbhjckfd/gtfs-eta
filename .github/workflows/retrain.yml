name: Retrain model

# Regenerates the training data, retrains the model, and exports the fresh
# artifacts to R2. Triggered manually, or automatically by the quality gate in
# scripts/score_quality.py (src/gate.py) when rolling MAE/coverage breaches its
# threshold — the "auto-retrain" half of the feedback loop.
#
# NB: this does NOT redeploy the worker. The worker is a passthrough; push_feed.py
# reloads `worker/eta_pipeline.pkl` from R2 on its next run, so `make export`
# alone is enough to put the new model live — no Cloudflare deploy creds needed.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this retrain was triggered'
        required: false
        default: 'manual'

concurrency:
  group: retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # full pipeline over ~a month of snapshots + training

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Show trigger reason
        run: echo "Retrain reason — ${{ github.event.inputs.reason }}"

      # PARALLEL=2 keeps the pipeline within the runner's ~7 GB (each day-worker
      # peaks ~2 GB). learn = pipeline + train; export uploads both pkls to R2.
      - name: Learn + export to R2
        run: |
          set -o pipefail
          make learn PARALLEL=2 2>&1 | tee /tmp/train.log
          make export
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            gtfs-lviv
          SENTRY_DSN:           ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE:       ${{ github.sha }}

      - name: Post summary to retrain log issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          REASON="${{ github.event.inputs.reason }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"

          if [ "$STATUS" = "success" ]; then
            TEST_MAE=$(grep -oP 'Test  MAE:\s+\K[\d.]+' /tmp/train.log | tail -1 || echo "N/A")
            TRAIN_MAE=$(grep -oP 'Train MAE:\s+\K[\d.]+' /tmp/train.log | tail -1 || echo "N/A")
            IMPROVEMENT=$(grep -oP 'Improvement:\s+\K[^\s]+' /tmp/train.log | tail -1 || echo "N/A")
            ROWS=$(grep -oP '[\d,]+(?= training rows across)' /tmp/train.log | tail -1 || echo "N/A")
            DATES=$(grep -oP '\d+(?= dates)' /tmp/train.log | tail -1 || echo "N/A")
            printf '### ✅ Retrain succeeded — [run](%s)\n\n| Metric | Value |\n|--------|-------|\n| Test MAE | %ss |\n| Train MAE | %ss |\n| vs baseline | %s%% |\n| Rows | %s across %s days |\n| Reason | %s |\n| Commit | %s |\n' \
              "$RUN_URL" "$TEST_MAE" "$TRAIN_MAE" "$IMPROVEMENT" "$ROWS" "$DATES" "$REASON" "$SHA" \
              > /tmp/retrain_body.md
          else
            printf '### ❌ Retrain failed — [run](%s)\n\n| | |\n|--|--|\n| Reason | %s |\n| Commit | %s |\n' \
              "$RUN_URL" "$REASON" "$SHA" \
              > /tmp/retrain_body.md
          fi

          gh issue comment 4 --body-file /tmp/retrain_body.md --repo "${{ github.repository }}"
