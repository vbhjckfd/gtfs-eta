name: Refresh GTFS worker data

on:
  schedule:
    # Daily at 02:00 UTC — low-traffic window; Lviv schedule updates are
    # typically published overnight.
    - cron: '0 2 * * *'
  workflow_dispatch:  # manual trigger to force an immediate refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Export fresh GTFS data to R2
        run: python scripts/export_worker_data.py
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            gtfs-lviv
