name = "gtfs-eta"
main = "worker.js"
compatibility_date = "2026-06-01"

[[r2_buckets]]
binding = "R2"
bucket_name = "gtfs-lviv"

[triggers]
crons = ["*/5 * * * *"]

[vars]
FEED_KEY = "feed/trip_updates.pb"
GITHUB_REPO = "vbhjckfd/gtfs-eta"
GITHUB_WORKFLOW = "push-feed.yml"
GITHUB_REF = "main"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
