name = "gtfs-eta"
main = "worker.py"
compatibility_date = "2024-12-01"
compatibility_flags = ["python_workers"]

[python_modules]
excludes = [".venv/**", ".venv-workers/**"]

[[r2_buckets]]
binding = "R2"
bucket_name = "gtfs-lviv"

[triggers]
crons = ["*/5 * * * *"]

[vars]
FEED_KEY = "feed/trip_updates.pb"
GITHUB_REPO = "vbhjckfd/gtfs-eta"
GITHUB_WORKFLOW = "push-feed.yml"
GITHUB_REF = "main"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
